<!DOCTYPE html>
<html lang="en">
<head>
<title>ATCKR | Login</title>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../CSS/login.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="container">

            <div class="logo-header">
                <a href="index.html">
                    <img src="../photos/atckr.png" alt="ATCKR Logo" class="logo">
                </a>
            </div>

            <nav class="site-nav">
                <ul>
                    <li><a href="about.html">About</a></li>
                    <li><a href="vocab.html">Vocab!</a></li>
                    <li><a href="prevention.html">Prevention</a></li>
                    <li><a href="login.html">Login/Sign-up</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>

        <!-- PAGE TITLE — matches contact page .page-title -->
        <h1 class="page-title">Login, if you dare...</h1>

        <!-- LOGIN FORM — same structure as contact page -->
        <section class="contact-section">
            <h2>Access Your Account</h2>
            <form method="post" class="contact-form">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Login</button>

            </form>

            <div class="forgot">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <div class="copyright">
            &copy; 2026 ATCKR Corporation.
            <p>J.I.M.D</p>
            <div class="contacts">
                <a href="contact.html">Contact us!</a>
            </div>
        </div>
    </footer>

</body>
</html>
