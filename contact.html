<h1 class="page-title">Support Page</h1>
<section class="contact-intro">
<p>

</div>

<!-- Contact Form -->
<section class="contact-section">
<h2>Send Us a Security Question</h2>
<form action="https://formspree.io/f/xwponean" method="POST" class="contact-form">
<label for="name">Name</label>
<input type="text" id="name" name="name" required>
<label for="email">Email</label>
<input type="email" id="email" name="email" required>
<label for="message">Your Question</label>
<textarea id="message" name="message" rows="5" required></textarea>
<button type="submit">Send Message</button>
</form>
</section>

</main> 

<!-- the pop up -->
<div style="text-align:center; margin:30px;">
<button id="press">TEST</button>
</div>
<div id="popup" class="modal">

<div class="modal-content">
<h2>Rate Our Cybersecurity Website</h2>
<form action="https://formspree.io/f/xwponean" method="POST"> 
<label for="rating">Rate Us</label>
<select name="rating" id="rating">
<option>5 - Excellent</option>
<option>4 - Good</option>
<option>3 - Average</option>
<option>2 - Poor</option>
<option>1 - Bad</option>
</select>
    
<label for="feedback">Your Feedback</label>
<textarea name="feedback" id="feedback" rows="4"></textarea>
<button type="submit">Submit Feedback</button>
    
</form>
<button id="close">Close</button>
</div>
</div>

<footer>

    <!-- java for the pop up -->
<script>
const btn = document.getElementById("press");
const modal = document.getElementById("popup");
const close = document.getElementById("close");
btn.onclick = function(){
modal.style.display = "block";
}
close.onclick = function(){
modal.style.display = "none";
}
window.onclick = function(event){
if(event.target == modal){
modal.style.display = "none";
}
}
    
</script>
