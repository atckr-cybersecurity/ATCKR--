<!DOCTYPE html>
<html lang="en">
<head>
<title>ATCKR | Login</title>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="container">

            <div class="logo-header">
                <a href="index.html">
                    <img src="atckr.png" alt="ATCKR Logo" class="logo">
                </a>
            </div>

            <nav class="site-nav">
                <ul>
                    <li><a href="about.html">About</a></li>
                    <li><a href="vocab.html">Vocab!</a></li>
                    <li><a href="prevention.html">Prevention</a></li>
                    <li><a href="login.html">Login/Sign-up</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>

        <!-- PAGE TITLE -->
        <h1 class="page-title">Login, if you dare...</h1>

        <!-- LOGIN FORM -->
        <section class="contact-section">
            <h2>Access Your Account</h2>

            <!-- IMPORTANT: added id="loginForm" -->
            <form method="post" class="contact-form" id="loginForm">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Login</button>

            </form>

            <!-- IMPORTANT: message output -->
            <p id="message"></p>

            <div class="forgot">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <div class="copyright">
            &copy; 2026 ATCKR Corporation.
            <p>J.I.M.D</p>
            <div class="contacts">
                <a href="contact.html">Contact us!</a>
            </div>
        </div>
    </footer>

    <!-- firebase + login logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_XcFPJnBqu95_YjWTRsjkWnwU5wHlA-s",
            authDomain: "atckr-c6d3d.firebaseapp.com",
            projectId: "atckr-c6d3d",
            storageBucket: "atckr-c6d3d.firebasestorage.app",
            messagingSenderId: "834010699386",
            appId: "1:834010699386:web:04134df603f29119010dc3",
            measurementId: "G-SHF21PMJ8R"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById("loginForm");
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const message = document.getElementById("message");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            message.textContent = "";

            try {
                await signInWithEmailAndPassword(auth, email.value, password.value);

                message.textContent = "Login successful!";

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);

            } catch (error) {
                if (error.code === "auth/invalid-credential") {
                    message.textContent = "Wrong email or password.";
                } else if (error.code === "auth/user-not-found") {
                    message.textContent = "No account found with that email.";
                } else if (error.code === "auth/wrong-password") {
                    message.textContent = "Wrong password.";
                } else if (error.code === "auth/invalid-email") {
                    message.textContent = "Invalid email address.";
                } else {
                    message.textContent = error.message;
                }
            }
        });
    </script>

</body>
</html>
